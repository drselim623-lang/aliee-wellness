workflows:
  # İLK BUILD — keystore, Play Store, App Store gerek yok.
  # Sadece debug APK üretir, doğrudan telefona yüklenebilir.
  first-build-android:
    name: Aliee Wellness — First Android Build (debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.0
      vars:
        PACKAGE_NAME: "com.spektrum.alieewellness"
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Analyze
        script: flutter analyze
      - name: Build release APK (split per ABI)
        script: |
          # Debug signing ile release build — App testi için yeterli, store yayını için DEĞİL
          flutter build apk --release --split-per-abi
    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log

  # PRODUCTION iOS — Nevora team altında, MedPoint ile aynı app_store_credentials.
  ios-release:
    name: Aliee Wellness — iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    environment:
      flutter: 3.32.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # Nevora team-level group (MedPoint ile paylaşımlı)
      vars:
        BUNDLE_ID: "com.spektrum.alieewellness"
        APP_STORE_APP_ID: "6785897743"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          echo "$IOS_CERT_PRIVATE_KEY_B64" | base64 -d > /tmp/ios_cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:/tmp/ios_cert_key.pem \
            --create
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Bump build number from App Store Connect
        script: |
          # Auto-bump: TestFlight + App Store + pubspec floor max + 1.
          set -e
          LATEST_TF=$(app-store-connect get-latest-testflight-build-number $APP_STORE_APP_ID 2>/dev/null || echo 0)
          LATEST_AS=$(app-store-connect get-latest-app-store-build-number $APP_STORE_APP_ID 2>/dev/null || echo 0)
          PUBSPEC_BUILD=$(grep -E '^version:' pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/' | head -1)
          if ! echo "$PUBSPEC_BUILD" | grep -qE '^[0-9]+$'; then PUBSPEC_BUILD=0; fi
          HIGHEST=$LATEST_TF
          if [ "$LATEST_AS" -gt "$HIGHEST" ]; then HIGHEST=$LATEST_AS; fi
          if [ "$PUBSPEC_BUILD" -gt "$HIGHEST" ]; then HIGHEST=$PUBSPEC_BUILD; fi
          NEW_BUILD_NUMBER=$(( HIGHEST + 1 ))
          echo "TF=$LATEST_TF App Store=$LATEST_AS Pubspec=$PUBSPEC_BUILD → New=$NEW_BUILD_NUMBER"
          echo "NEW_BUILD_NUMBER=$NEW_BUILD_NUMBER" >> $CM_ENV
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --build-number=$NEW_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  # PRODUCTION ANDROID — keystore + Play Store yayını hazır olunca.
  # Aliee için ayrı keystore oluşturulup Codemagic'e tanımlanacak.
  android-release:
    name: Aliee Wellness — Android Release (AAB)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.0
      groups:
        - aliee_android_keystore   # Aliee'ye özel (sonra eklenecek)
      vars:
        PACKAGE_NAME: "com.spektrum.alieewellness"
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Analyze
        script: flutter analyze
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          EOF
      - name: Build AAB
        script: |
          BUILD_NUMBER=$(($(google-play get-latest-build-number --package-name "$PACKAGE_NAME") + 1))
          flutter build appbundle --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
