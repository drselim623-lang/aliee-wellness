name: aliee_wellness
description: "Aliee Wellness — Spektrum Longevity App. Otel misafirleri için longevity vitrini, anamnez, doktora sor ve başvuru."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  cloud_functions: ^5.1.3

  # State / routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Utilities
  intl: ^0.20.2
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
